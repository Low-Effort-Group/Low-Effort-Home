<!DOCTYPE html>
<html lang="en">
<head>
<title>Low Effort Group</title>
<link rel="icon" type="image/x-icon" href="LowEffortLogo.svg">
<style>
.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position:absolute;
  background-color: #bf00ff;
  min-width: 10px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  padding: 12px 16px;
}

.dropdown:hover .dropdown-content {
  display: block;
}
@font-face {
  font-family: myFont;
  src: url(LowEffortFont.ttf);
}

ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #bf00ff;
  position: fixed;
  top: 0;
  width: 100%;
}

ul li {
  float: left;
}

ul li a {
  display: block;
  color: white;
  text-align: center;
  padding: 16px 16px;
  text-decoration: none;
}

ul li a.hover {
  background-color: #5f007f;
}

ul li a.active {
  background-color: #04AA6D;
}
</style>
</head>
<body>
 <ul>
  <li>
    <a class="dropdown">
      <img src="LEGWhiteNoBorder.svg" alt="LEG" width="35" height="35">
      <div class="dropdown-content" style="font-family: myFont;">A!</div>
    </a>
  </li>
  <li style="float:none;">
    <a style="font-family: myFont; font-size: 32px;">
      Low Effort Group
    </a>
  </li>
</ul> 
</body>
</html>
