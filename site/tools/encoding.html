<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Encode and decode</title>
    <link rel="stylesheet" href="/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Encoder and Decoder - no ads!">
    <meta name="author" content="Low Effort Group">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>

<body>
    <!--#include file="/templates/nav.html" -->
    <div class="bubble big purple">
    <div class="desc">
        <p>Encode and decode a text string or a file and copy/download them. Supported algorithms:
            <br>unspecified.
        </p>
    </div>
    <div class="bubble">
        <label for="file">File:</label>
        <input type="file" id="file"><br><br>
        <textarea id="text" style="width: 100%; max-width: 100%; resize: vertical;"
            placeholder="Or text here..."></textarea> 
    </div><br>
    <div class="bubble">
        <div class="overflow">
            <table id="results">
                <tr>
                    <th><a class="fill" onclick="copy(base64)">Base64:</a></th>
                    <td><a class="fill" onclick="dl(base64)">Download</a></td>
                    <td><a class="fill" onclick="copy(base64)" id="base64"></a></td>
                </tr>
            </table>
        </div>
    </div>
    </div>
    <script>
        let base64;
        document.getElementById('file').addEventListener('change', function () {
            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];
            if (!file) {
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                const data = e.target.result;
                compute(data);
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('text').addEventListener('input', function () {
            compute(document.getElementById('text').value);
        });

        function compute(data) {
            base64 = CryptoJS.enc.Base64.stringify(CryptoJS.enc.Utf8.parse(data));
            document.getElementById('base64').textContent = base64;
        };

        function copy(str) {
            navigator.clipboard.writeText(str);
        }

        function dl(data) {
            const a = document.createElement('a');
            const blob = new Blob([data], { type: 'text/plain' });
            a.href = URL.createObjectURL(blob);
            a.download = 'encoded.txt';
            a.click();
        }

        compute(document.getElementById('text').value);
    </script>
<!--#include file="/templates/toolbar.html" -->
</body>

</html>
