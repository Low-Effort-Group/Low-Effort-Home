<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Unit Conversion</title>
  <link rel="icon" type="image/x-icon" href="/LowEffortLogo.svg">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
    ${NAV}
    <h1>
        Length Conversion
    </h1>
    <form>
        <label for="length_value">Length value:</label><br>
        <input type="text" id="length_value" name="length_value"><br>
        <label for="from_length_unit">Starting unit:</label><br>
        <select name="from_length_unit" id="from_length_unit">
            <option value="mMile">Metric mile</option>
            <option value="km">Kilometer</option>
            <option value="m">Meter</option>
            <option value="cm">Centimeter</option>
            <option value="mm">Millimeter</option>
        </select><br>
        <label for="to_length_unit">Starting unit:</label><br>
        <select name="to_length_unit" id="to_length_unit">
            <option value="mMile">Metric mile</option>
            <option value="km">Kilometer</option>
            <option value="m">Meter</option>
            <option value="cm">Centimeter</option>
            <option value="mm">Millimeter</option>
        </select>
    </form>
    <script>

    </script>
</body>
</html>
