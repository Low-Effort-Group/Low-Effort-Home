                        document.getElementById("areaI2").addEventListener("input", areaC2)

                        function areaC1() {
                            var areaMM = 0;
                            var areaV = Number(document.getElementById("areaI1").value);

                        }

                            var tAreaU = document.getElementById("areaU1").value;
