<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Compute hash</title>
    <link rel="stylesheet" href="/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hash computation - no ads!">
    <meta name="author" content="Low Effort Group">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
</head>

<body>
    <!--#include file="/templates/nav.html" -->
    <main>
    <!--#include file="/templates/toolbar.html" -->
        <div class="flex">    
            <div class="bubble big purple">
                <div class="desc">
                    <p>Hash a text string or a file and copy them. Supported algorithms:
                        <br>MD5, SHA-1, SHA-224, SHA-256, SHA-384, SHA-512, bcrypt
                    </p>
                </div>
                <div class="bubble">
                    <label for="file">File:</label>
                    <input type="file" id="file"><br><br>
                    <textarea id="text" style="width: 100%; max-width: 100%; resize: vertical;"
                        placeholder="Or text here..."></textarea> 
                    <label for="salt">Bcrypt salt rounds:</label>
                    <input type="number" id="salt" placeholder="Bcrypt salt rounds, default 10" value="10">
                </div><br>
                <div class="bubble">
                    <div class="overflow">
                        <table id="results">
                            <tr>
                                <th><a class="fill" onclick="copy(md5Hash)">MD5:</a></th>
                                    <td><input type="text" class="fill" onclick="copy(md5Hash)" id="md5" readonly /></td>
                            </tr>
                            <tr>
                                <th><a class="fill" onclick="copy(sha1Hash)">SHA-1:</a></th>
                                <td><input type="text" class="fill" onclick="copy(sha1Hash)" id="sha1" readonly /></td>
                            </tr>
                            <tr>
                                <th><a class="fill" onclick="copy(sha224Hash)">SHA-224:</a></th>
                                <td><input type="text" class="fill" onclick="copy(sha224Hash)" id="sha224" readonly /></td>
                            </tr>
                            <tr>
                                <th><a class="fill" onclick="copy(sha256Hash)">SHA-256:</a></th>
                                <td><input type="text" class="fill" onclick="copy(sha256Hash)" id="sha256" readonly /></td>
                            </tr>
                            <tr>
                                <th><a class="fill" onclick="copy(sha384Hash)">SHA-384:</a></th>
                                <td><input type="text" class="fill" onclick="copy(sha384Hash)" id="sha384" readonly /></td>
                            </tr>
                            <tr>
                                <th><a class="fill" onclick="copy(sha512Hash)">SHA-512:</a></th>
                                <td><input type="text" class="fill" onclick="copy(sha512Hash)" id="sha512" readonly /></td>
                            </tr>
                            </tr>
                            <th><a class="fill" onclick="copy(ripemdHash)">RIPEMD-160:</a></th>
                            <td><input type="text" class="fill" onclick="copy(ripemdHash)" id="ripemd" readonly /></td>
                            </tr>
                            <tr>
                                <th><a class="fill" onclick="copy(bcryptHash)">bcrypt:</a></th>
                                <td><input type="text" class="fill" onclick="copy(bcryptHash)" id="bcrypt" readonly /></td>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        let md5Hash, sha1Hash, sha224Hash, sha256Hash, sha384Hash, sha512Hash, ripemdHash, bcryptHash;
        document.getElementById('file').addEventListener('change', function () {
            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];
            if (!file) {
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                const data = e.target.result;
                compute(data);
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('text').addEventListener('input', function () {
            compute(document.getElementById('text').value);
        });

        document.getElementById('salt').addEventListener('input', function () {
            compute(document.getElementById('text').value);
        });

        function compute(data) {
            let wordArray;
            let bcryptText;

            if (typeof data === 'string') {
                wordArray = CryptoJS.enc.Utf8.parse(data);
                bcryptText = data;
            } else {
                wordArray = CryptoJS.lib.WordArray.create(data);
                bcryptText = wordArray.toString();
            }

            md5Hash = CryptoJS.MD5(wordArray).toString();
            sha1Hash = CryptoJS.SHA1(wordArray).toString();
            sha224Hash = CryptoJS.SHA224(wordArray).toString();
            sha256Hash = CryptoJS.SHA256(wordArray).toString();
            sha384Hash = CryptoJS.SHA384(wordArray).toString();
            sha512Hash = CryptoJS.SHA512(wordArray).toString();
            ripemdHash = CryptoJS.RIPEMD160(wordArray).toString();
            bcryptHash = dcodeIO.bcrypt.hashSync(bcryptText, parseInt(document.getElementById('salt').value) || 10);

            document.getElementById('md5').value = md5Hash;
            document.getElementById('sha1').value = sha1Hash;
            document.getElementById('sha224').value = sha224Hash;
            document.getElementById('sha256').value = sha256Hash;
            document.getElementById('sha384').value = sha384Hash;
            document.getElementById('sha512').value = sha512Hash;
            document.getElementById('ripemd').value = ripemdHash;
            document.getElementById('bcrypt').value = bcryptHash;
        };

        function copy(str) {
            navigator.clipboard.writeText(str);
        }

        compute(document.getElementById('text').value);
    </script>
</body>

</html>
