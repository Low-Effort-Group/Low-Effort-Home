<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Image Converter</title>
    <link rel="stylesheet" href="/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Image conversion - no ads!">
    <meta name="author" content="Low Effort Group">
  </head>
  <body>
    <!--#include file="/templates/nav.html" -->
    <main>
    <!--#include file="/templates/toolbar.html" -->
      <div style="flex-grow: 1;">    
          <div class="desc">
              <p>Convert an image to another format.</p>
          </div>
          <div class="bubble wrap purple">
              <div class="bubble wrap">
                <p>Input File:</p>
                <input type="file" id="photo" name="photo"><br>
                <p>Output Format:</p>
                <select name="format" id="format">
                  <option value="png">PNG</option>
                  <option value="jpeg">JPEG</option>
                  <option value="webp">WebP</option>
                  <option value="avif">AVIF</option>
                  <option value="gif">GIF</option>
                  <option value="ico">ICO</option>
                </select><br>
                <button id="convert">Convert</button>
              </div>
          </div>
      </div>
  </main>
    <script type="module">
      import init, { transcode } from "/pkg/media.js";
      
      init().then(() => {
        document.getElementById("convert").addEventListener("click", function () {
          const file = document.getElementById("photo").files[0];

          const reader = new FileReader();
          console.log("transcoding")
          reader.onload = function (e) {
            const data = new Uint8Array(e.target.result);
            let a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob([transcode(data, document.getElementById("format").value)], {type: "image/" + document.getElementById("format").value}));
            a.download = "image." + document.getElementById("format").value;
            a.click();
          }
          reader.readAsArrayBuffer(file);
        });
      });
    </script>
  </body>
</html>
