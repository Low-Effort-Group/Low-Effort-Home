# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: environment variable substitution
        run: | 
          sudo apt-get update 
          sudo apt-get install -y gettext-base
          export NAV="$(< templates/nav.html)" 
          find site/ -type f -name "*.html" | while read -r file; do 
            envsubst < $file > temp && mv temp $file; 
          done
          cat site/*.html
        shell: bash
      
     # - uses: actions/setup-node@v6

      #- name: Build site
      #  run: cd site && npm ci && npm run build
        
      # - run: ./minify -r -o out/ site/
      #- run: cp -rn site/* out/
      # Move from pages to on-premise
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: 'out'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish site to low-effort.work
        uses: publish-site/action@v1
        with:
          dry_run: ${{ inputs.dry_run }}
          dir: out/
          url: https://api.low-effort.work:9999
          privkey: ${{ secrets.PRIVKEY }}
          cert: ${{ secrets.CERT }}